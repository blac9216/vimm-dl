name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - run: dotnet restore

      # Pull this repo's own tools image (published by tools-image.yml as
      # ghcr.io/<owner>/vimm-dl-tools). Login + pull are best-effort: if the image is unavailable the
      # job still proceeds and ToolsContainer builds it locally from Dockerfile.tools, so the suite
      # (and coverage) always run instead of the job aborting here (#203).
      - name: Log in to GHCR
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-pull tools image (non-fatal)
        run: docker pull ghcr.io/${{ github.repository_owner }}/vimm-dl-tools:latest || true

      - name: Run all tests with coverage
        env:
          VIMM_TOOLS_IMAGE: ghcr.io/${{ github.repository_owner }}/vimm-dl-tools:latest
        run: dotnet test --no-restore --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      # coverlet emits one coverage.cobertura.xml per test assembly (issue #177); merge them into a
      # single source-filtered report so the number reflects the whole suite, not raw per-assembly
      # line-rate (which is diluted by each assembly's full dependency closure).
      - name: Install ReportGenerator
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Merge coverage into a report
        if: always()
        # The ReportGenerator global tool targets an earlier .NET; roll it forward so it launches on the
        # .NET 10-only runner that setup-dotnet provisions.
        env:
          DOTNET_ROLL_FORWARD: LatestMajor
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:CoverageReport \
            -reporttypes:"Cobertura;Html;MarkdownSummaryGithub"

      - name: Publish coverage to the job summary
        if: always()
        run: cat CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      # A build-breaking threshold gate is intentionally NOT enabled yet (issue #187, optional AC): it
      # needs a maintainer-agreed baseline read off the merged report this job now publishes. To enable,
      # add a step that fails when CoverageReport/Cobertura.xml's top-level line-rate drops below the floor.
